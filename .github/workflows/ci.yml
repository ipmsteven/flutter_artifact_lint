name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  dart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test integration_test bin

      - name: Analyze
        run: dart analyze

      - name: Test
        run: dart test

      - name: Validate package
        run: dart pub publish --dry-run

  ios-e2e-shard:
    name: ios-e2e-shard (${{ matrix.shard }})
    runs-on: macos-latest
    timeout-minutes: 35

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - shard: core
            command: dart test integration_test/flutter_ios_build_e2e_test.dart integration_test/macho_objc_toolchain_e2e_test.dart integration_test/macho_swift_toolchain_e2e_test.dart --reporter expanded
          - shard: permissions-a
            command: FAL_PLUGIN_MATRIX_SHARD=permissions-a dart test integration_test/flutter_ios_plugin_matrix_e2e_test.dart --reporter expanded
          - shard: permissions-b
            command: FAL_PLUGIN_MATRIX_SHARD=permissions-b dart test integration_test/flutter_ios_plugin_matrix_e2e_test.dart --reporter expanded
          - shard: platform
            command: FAL_PLUGIN_MATRIX_SHARD=platform dart test integration_test/flutter_ios_plugin_matrix_e2e_test.dart --reporter expanded
          - shard: ecosystem
            command: FAL_PLUGIN_MATRIX_SHARD=ecosystem dart test integration_test/flutter_ios_plugin_matrix_e2e_test.dart --reporter expanded

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show toolchain versions
        run: |
          flutter --version
          dart --version
          xcodebuild -version

      - name: Install dependencies
        run: dart pub get

      - name: Run iOS integration shard
        run: ${{ matrix.command }}

  ios-e2e:
    runs-on: ubuntu-latest
    needs: ios-e2e-shard
    if: ${{ always() }}

    steps:
      - name: Check iOS E2E shards
        run: |
          if [ "${{ needs.ios-e2e-shard.result }}" != "success" ]; then
            echo "iOS E2E shard result: ${{ needs.ios-e2e-shard.result }}"
            exit 1
          fi
          echo "All iOS E2E shards passed."
